<!-- action btns -->
<section class="d-flex mt-3 mb-3 gap-1 justify-content-center p-3">
    <!-- Create Project -->
    <button
        type="button"
        class="btn btn--medium"
        [routerLink]="['../project']"
        aria-label="Create project"
        *ngIf="currentExploreRoute == 'projects'"
        style="position: absolute; left: 0; margin-left: 3rem"
    >
        <img
            src="static/assets/icons/feather/white/plus.svg"
            alt=""
            height="20"
            width="20"
            loading="lazy"
        />
        <span>Create Project</span>
    </button>

    <!-- show Projects/Templates -->
    <div class="btn-group" role="group" aria-label="Basic outlined example">
        <button
            type="button"
            class="btn"
            [routerLink]="['projects']"
            aria-label="Browse projects"
            [ngClass]="{ 'btn--hollow': currentExploreRoute !== 'projects' }"
            (click)="removeFocus($event)"
        >
            Projects
        </button>

        <button
            type="button"
            class="btn"
            [routerLink]="['templates']"
            aria-label="Browse templates"
            [ngClass]="{ 'btn--hollow': currentExploreRoute !== 'templates' }"
            (click)="removeFocus($event)"
        >
            Templates
        </button>
    </div>
</section>

<router-outlet />
