<section
    class="project border border-secondary-subtle rounded-3"
    id="project-{{ project.id }}"
>
    <div class="project">
        <div class="details">
            <h2 class="name text-break">{{ project.name }}</h2>
            <span class="icon-pin" aria-hidden="true"></span>
            <span>{{ project.country }}</span>
            <br />
            <span class="property">
                {{ project.date_created || "{not defined}" | date }}
            </span>
        </div>

        <div class="actions">
            <a
                class="btn btn--action action"
                [routerLink]="['../update/', project.id]"
                fragment="update"
            >
                <span class="icon icon-edit" aria-hidden="true"></span>
            </a>

            <button
                id="duplicate_{{ project.id }}"
                style="margin-top: 0.25rem"
                class="btn btn--action action"
                type="button"
                value="Delete"
                (click)="duplicate_modal(project.id)"
            >
                <span class="icon icon-duplicate" aria-hidden="true"></span>
            </button>

            <button
                id="delete_{{ project.id }}"
                style="margin-top: 0.25rem"
                class="btn btn--action action"
                type="button"
                value="Delete"
                (click)="delete_modal(project.id)"
            >
                <span class="icon icon-delete" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <div class="project__scenarios text-center">
        <ng-container *ngIf="scenarios$ | async as scenarios; else loading">
            <!-- Scenario List -->
            <ng-container *ngIf="scenarios.length > 0">
                <div
                    class="collapse"
                    #collapse="ngbCollapse"
                    [(ngbCollapse)]="isCollapsed"
                >
                    <ul class="list-group rounded-0">
                        <li
                            class="list-group-item scenario_item"
                            *ngFor="let scenario of scenarios"
                        >
                            <app-project-scenario-item
                                [project]="project"
                                [scenario]="scenario"
                                (deleteScenario)="deleteScenario($event)"
                                (duplicateScenario)="duplicateScenario($event)"
                            />
                        </li>
                    </ul>
                </div>
            </ng-container>

            <!-- scenario actions -->
            <div class="d-flex scenario-actions">
                <!-- show Scenarios -->

                <button
                    type="button"
                    class="btn btn-outline-primary action"
                    (click)="isCollapsed = !isCollapsed"
                    [attr.aria-expanded]="!isCollapsed"
                    aria-controls="collapseExample"
                    *ngIf="scenarios.length > 0"
                >
                    <span
                        class="icon icon--small js-toggle-scenario-icon"
                        aria-hidden="true"
                        [ngClass]="{
                            'icon-i_arrow_down': isCollapsed,
                            'icon-i_arrow_up': !isCollapsed
                        }"
                    >
                    </span>
                    <span class="js-toggle-scenario-name"> Scenarios </span>
                </button>

                <!-- new Scenario -->
                <button
                    class="btn btn--success action"
                    type="button"
                    (click)="newScenario(+project.id, project.name)"
                >
                    <img
                        src="static/assets/icons/feather/white/plus.svg"
                        alt=""
                        height="20"
                        width="20"
                        loading="lazy"
                    />
                    <span>Scenario</span>
                </button>
            </div>
        </ng-container>

        <ng-template #loading>
            <span class="text-muted p-2">Loading scenarios...</span>
        </ng-template>
    </div>
</section>
