<section
    class="project border border-secondary-subtle rounded-3"
    id="project-{{ project.id }}"
>
    <div class="project">
        <div class="details">
            <h2 class="name text-break">{{ project.name }}</h2>
            <span class="icon-pin" aria-hidden="true"></span>
            <span>{{ project.country }}</span>

            <br />

            <span class="property">
                {{ project.date_created || "{not defined}" | date }}
            </span>

            <div class="actions">
                <a
                    class="btn btn--action action d-flex"
                    [routerLink]="['/project/', project.id]"
                >
                    <span class="icon icon-edit p-2" aria-hidden="true"></span>
                </a>

                <button
                    id="duplicate_{{ project.id }}"
                    style="margin-top: 0.25rem"
                    class="btn btn--action action d-flex"
                    type="button"
                    value="Duplicate"
                    (click)="onDuplicateProject(project.id)"
                >
                    <span
                        class="icon icon-duplicate p-2"
                        aria-hidden="true"
                    ></span>
                </button>

                <button
                    id="delete_{{ project.id }}"
                    style="margin-top: 0.25rem"
                    class="btn btn--action action d-flex"
                    type="button"
                    value="Delete"
                    (click)="onDeleteProject(project.id)"
                >
                    <span
                        class="icon icon-delete p-2"
                        aria-hidden="true"
                    ></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scenario List -->
    <div class="project__scenarios text-center">
        <div
            class="collapse"
            #collapse="ngbCollapse"
            [(ngbCollapse)]="isCollapsed"
        >
            <ng-container *ngIf="loading.scenarios; else dataBlock">
                <span class="text-muted p-2"> Loading scenarios... </span>
            </ng-container>

            <ng-template #dataBlock>
                <ng-container
                    *ngIf="
                        project.scenarioList && project.scenarioList.length > 0;
                        else noData
                    "
                >
                    <ul class="list-group rounded-0">
                        <li
                            class="list-group-item scenario_item"
                            *ngFor="let scenario of project.scenarioList"
                        >
                            <app-project-scenario-item
                                [project]="project"
                                [scenario]="scenario"
                                (deleteScenario)="deleteScenario($event)"
                                (duplicateScenario)="duplicateScenario($event)"
                            />
                        </li>
                    </ul>
                </ng-container>

                <ng-template #noData>
                    <span class="text-muted p-2">No scenarios available!</span>
                </ng-template>
            </ng-template>
        </div>

        <!-- scenario actions -->
        <div class="d-flex scenario-actions">
            <!-- show Scenarios -->
            <button
                type="button"
                class="btn btn-outline-primary action"
                [attr.aria-expanded]="!isCollapsed"
                aria-controls="collapseExample"
                [disabled]="loading.scenarios"
                (click)="toggleCollapse()"
            >
                <span
                    class="icon icon--small js-toggle-scenario-icon"
                    aria-hidden="true"
                    [ngClass]="{
                        'icon-i_arrow_down': isCollapsed,
                        'icon-i_arrow_up': !isCollapsed,
                    }"
                >
                </span>
                <span class="js-toggle-scenario-name"> Scenarios </span>
            </button>

            <!-- new Scenario -->
            <button
                class="btn btn--success action"
                type="button"
                [disabled]="loading.scenarios"
                (click)="newScenario(+project.id, project.name)"
            >
                <img
                    src="static/assets/icons/feather/white/plus.svg"
                    alt=""
                    height="20"
                    width="20"
                    loading="lazy"
                />
                <span>Scenario</span>
            </button>
        </div>
    </div>
</section>
