<div class="d-flex justify-content-between align-items-center scenario-item">
    <span
        class="form-check-label"
        role="button"
        (click)="openScenario(scenario.id)"
    >
        {{ scenario.name }}
    </span>

    <div class="d-flex __actions">
        <button
            id="duplicate_{{ scenario.id }}"
            class="btn btn--action action"
            type="button"
            value="Duplicate"
            (click)="onDuplicateScenario(scenario.id)"
        >
            <span
                class="d-flex justify-content-between align-items-centericon icon-duplicate p-2"
                aria-hidden="true"
            ></span>
        </button>

        <button
            id="delete_{{ scenario.id }}"
            class="btn btn--action action"
            type="button"
            value="Delete"
            (click)="onDeleteScenario(scenario.id)"
        >
            <span
                class="d-flex justify-content-between align-items-center icon icon-delete p-2"
                aria-hidden="true"
            ></span>
        </button>
    </div>
</div>
