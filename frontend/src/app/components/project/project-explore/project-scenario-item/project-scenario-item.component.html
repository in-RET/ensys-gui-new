<div class="d-flex justify-content-between align-items-center">
    <span
        class="form-check-label"
        role="button"
        (click)="openScenario(scenario.id)"
    >
        {{ scenario.name }}
    </span>

    <div class="d-flex">
        <button
            id="duplicate_{{ scenario.id }}"
            style="margin-top: 0.25rem"
            class="btn btn--action action d-flex"
            type="button"
            value="Duplicate"
            (click)="onDuplicateScenario(scenario.id)"
        >
            <span class="icon icon-duplicate p-2" aria-hidden="true"></span>
        </button>

        <button
            id="delete_{{ scenario.id }}"
            style="margin-top: 0.25rem"
            class="btn btn--action action d-flex"
            type="button"
            value="Delete"
            (click)="onDeleteScenario(scenario.id)"
        >
            <span class="icon icon-delete p-2" aria-hidden="true"></span>
        </button>
    </div>
</div>
