<div
    class="modal modal-sheet position-static d-block bg-body-secondary p-4 py-md-5"
    tabindex="-1"
    role="dialog"
    id="modalTour"
>
    <div
        class="modal-dialog d-flex"
        style="
            height: 100%;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
        "
    >
        <div class="modal-content rounded-4 shadow">
            <div class="modal-body d-flex row gap-3" style="max-height: 100%">
                <ng-container *ngIf="scenarioCount;">
                    <h2 class="fw-bold mb-0 text-center">
                        {{ currentScenario.project?.name }}
                        /
                        {{ currentScenario.scenario?.name }}
                    </h2>

                    <div style="max-height: 70%">
                        <app-simulation-list-card [data]="simulationList" />
                    </div>
                </ng-container>
            </div>
        </div>
    </div>
</div>
