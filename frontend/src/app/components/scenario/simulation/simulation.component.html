<section class="px-3">
    <div class="d-flex justify-content-between align-items-center">
        <p class="h1 text-center p-1">Results Prototyping</p>
        <button
            class="btn btn-primary m-1"
            (click)="downloadDump()"
        >
            Download Dump
        </button>
    </div>

    <div id="wrapper" class="p-3 border border-secondary rounded">
        <div class="loading" [hidden]="!loading">
            <div
                class="spinner-border text-primary"
                style="width: 3rem; height: 3rem"
                role="status"
            ></div>
            <span class="visually-hidden">Loading...</span>
        </div>

        <div id="power_div" class="border-bottom border-secondary" [hidden]=true>
            <h3 class="plot_heading">Installed Powers</h3>
            <table class="static_table" id="power_table">
                <tr>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Unit</th>
                </tr>
            </table>
        </div>

        <div id="energy_div" class="border-bottom border-secondary" [hidden]=true>
            <h3 class="plot_heading">Energy Quantities</h3>
            <table class="static_table" id="energy_table">
                <tr>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Unit</th>
                </tr>
            </table>
        </div>

        <div id="cost_div" class="border-bottom border-secondary" [hidden]=true>
            <h3 class="plot_heading">Emissions and Costs</h3>
            <table class="static_table" id="cost_table">
                <tr>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Unit</th>
                </tr>
            </table>
        </div>

        <div class="border-bottom border-secondary">
            <h3 class="plot_heading">Plots</h3>
            <div id="plotly_div" class="charts-wrapper"></div>
        </div>

    </div>
</section>
