<footer class="step-footer" style="z-index: 1">
    <div>
        <div class="step-footer__center gap-1 d-flex">
            <ng-container *ngIf="step > 0">
                <button
                    class="btn btn--medium btn--hollow btn--previous"
                    (click)="previous()"
                >
                    Scenario Setup
                </button>
            </ng-container>

            <button class="btn btn--medium" *ngIf="step == 0" (click)="next()">
                Next
            </button>

            <ng-container *ngIf="step == 1">
                <button
                    class="btn btn--medium btn--success"
                    (click)="onStartSimulation()"
                >
                    <img
                        src="/static/assets/icons/feather/black/play.svg"
                        alt="start"
                        title="start simulation"
                    />
                </button>

                <button
                    class="btn btn--medium btn--transparent"
                    *ngIf="isScenarioNew"
                    [disabled]="scenarioService.isDrawflowEmpty$ | async"
                    (click)="save()"
                >
                    Save
                </button>

                <button
                    class="btn btn--medium btn--transparent"
                    *ngIf="!isScenarioNew"
                    [disabled]="scenarioService.isDrawflowEmpty$ | async"
                    (click)="update()"
                >
                    Update
                </button>
            </ng-container>
        </div>

        <ng-container *ngIf="step == 1 && scenarioData.scenario">
            <a
                class="btn btn--medium btn--transparent"
                [ngClass]="{ disabled: isScenarioNew }"
                (click)="onOpenSimulations(scenarioData.scenario.id)"
            >
                Simulation(s)
            </a>
        </ng-container>
    </div>
</footer>
