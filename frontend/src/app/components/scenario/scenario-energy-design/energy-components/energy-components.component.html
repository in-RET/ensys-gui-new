<section class="h-100 w-10 shadow">
    <div
        class="h-100"
        style="display: flex; flex-direction: column; background-color: #f4f7f9"
    >
        <div class="components__content h-100">
            <div
                class="section section--{{ componet.group_name }}"
                *ngFor="let componet of components"
            >
                <ng-container
                    *ngFor="let component of componet.group_components"
                >
                    <app-energy-drag-items
                        [id]="component.id"
                        [name]="component.name"
                        [group]="componet.group_name"
                        (touchEnd)="_touchEnd($event)"
                    />
                </ng-container>
            </div>
        </div>

        <div
            class="d-flex gap-2 flex-column p-3 justify-content-center align-items-center"
        >
            <ng-container
                *ngIf="scenarioStateService.userModelingState | async as state"
            >
                <label class="d-flex flex-column p-3 cursor-pointer">
                    Auto

                    <input
                        type="checkbox"
                        [ngModel]="state?.autoUpdate"
                        (ngModelChange)="onChange_autoUpdate($event)"
                    />
                </label>
            </ng-container>

            <button
                class="btn btn--small btn--hollow btn--previous"
                title="Scenario Setup"
                (click)="onGoToSetupPage()"
            >
                Setup
            </button>

            <button
                class="btn btn--small btn--hollow btn--previous d-none"
                title="Scenario Setup"
                (click)="onGoToSetupPage()"
            >
                <i class="back"></i>
            </button>
        </div>
    </div>
</section>
