<app-modal
    *ngIf="modalInfo"
    [show]="showModal.setup"
    [title]="'Setup Scenario'"
    [size]="'fullscreen'"
    (closeModal)="closeModal(false)"
>
    <div modal-body>
        <ng-content />
    </div>

    <div modal-actions>
        <button
            type="submit"
            class="btn btn--success btn--medium"
            (click)="onFormSubmitted()"
        >
            <span>Update</span>
        </button>
    </div>

    <ng-template #empty_form_actions>
        <button
            type="button"
            class="btn btn--primary btn--medium"
            (click)="closeModal(false)"
        >
            <span>Close</span>
        </button>
    </ng-template>
</app-modal>
