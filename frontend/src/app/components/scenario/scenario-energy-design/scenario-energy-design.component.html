<div class="system-design">
    <app-energy-components
        [components]="components"
        (touchEnd)="touchEnd($event)"
        *ngIf="!isFullscreen"
    />

    <app-energy-drawflow
        class="w-100 h-100 border"
        (showFormModal_node)="showFormModal_node($event)"
        (showFormModal_flow)="showFormModal_flow($event)"
        (toggleFullScreen)="toggleFullScreen()"
    />
</div>

<app-modal
    *ngIf="formModal_info && formModal_info.show"
    [title]="formModal_info.title"
    (closeModal)="closeModal($event)"
    [hidden]="formModal_info.hide"
>
    <div class="node-info" modal-header-center-icon>
        <button
            title="Info"
            (click)="openInfoUrl(formModal_info.url)"
            class="btn btn--info btn--icon"
        >
            <!-- <a [href]="formModal_info.url" target="_blank" class="w-100 h-100">
            </a> -->
        </button>
    </div>

    <div modal-form>
        <div *ngIf="formModal_info.formData !== null">
            <p
                class="text-center p-2 border border-warning rounded-4 shadow"
                *ngIf="
                    formModal_info.type == 'flow' &&
                    (formModal_info.data.oep || formModal_info.node?.data?.oep)
                "
            >
                The <b>OEP </b> field is enabled at the node level, so please
                review and adjust its parameters directly in the node.
            </p>

            <app-form
                [formData]="formModal_info.formData"
                (onSubmit)="submitFormData()"
                #form
            />
        </div>

        <!-- ports -->
        <!-- transformer -->
        <div
            class="row mb-3"
            *ngIf="
                formModal_info.type == 'node' &&
                formModal_info.node &&
                (formModal_info.node.type === 'transformer' ||
                    formModal_info.node.class === 'transformer')
            "
        >
            <div class="col-6">
                <app-order-list
                    label="Inputs"
                    [data]="formModal_info.data.ports.inputs"
                    [acceptDuplicate]="false"
                    [fields]="['name', 'num']"
                    [editable]="formModal_info.data.ports?.editable"
                    #transform_inputs
                />
            </div>

            <div class="col-6">
                <app-order-list
                    label="Outputs"
                    [data]="
                        formModal_info.data
                            ? formModal_info.data.ports.outputs
                            : null
                    "
                    [acceptDuplicate]="false"
                    [fields]="['name', 'num']"
                    [editable]="formModal_info.data.ports?.editable"
                    #transform_outputs
                />
            </div>
        </div>
    </div>

    <div
        modal-actions
        *ngIf="formModal_info.formData !== null; else empty_form_actions"
    >
        <span
            class="text-danger"
            style="position: absolute; left: 0; padding-left: 3rem"
            *ngIf="formError.isShow"
        >
            {{ formError.msg }}
        </span>

        <button
            type="submit"
            class="btn btn--success btn--medium"
            (click)="submitFormData()"
        >
            <span>{{ formModal_info.action.label }}</span>
        </button>
    </div>

    <ng-template #empty_form_actions>
        <button
            type="button"
            class="btn btn--primary btn--medium"
            (click)="modalComponent._closeModal(false)"
        >
            <span>Close</span>
        </button>
    </ng-template>
</app-modal>

<!-- form modal calculator -->
<app-modal
    *ngIf="formModal_calculator.show"
    [title]="formModal_calculator.title"
    (closeModal)="closeModalEpCostsCalculator()"
>
    <div modal-form>
        <p class="text-danger" *ngIf="formCalError.isShow">
            Error: {{ formCalError.msg }}
        </p>

        <app-form
            [formData]="formModal_calculator.formData"
            (onSubmit)="calculateEpCosts()"
            #form_cal
        />
    </div>

    <div
        modal-actions
        *ngIf="formModal_calculator.formData !== null; else empty_form_actions"
    >
        <button
            type="submit"
            class="btn btn--success btn--medium"
            (click)="calculateEpCosts()"
        >
            <span>{{ formModal_calculator.action.label }}</span>
        </button>
    </div>

    <ng-template #empty_form_actions>
        <button
            type="button"
            class="btn btn--primary btn--medium"
            (click)="modalComponent._closeModal(false)"
        >
            <span>Close</span>
        </button>
    </ng-template>
</app-modal>

<!-- form modal simulation -->
<app-modal
    *ngIf="showSimulations"
    title="Simulations"
    (closeModal)="closeSimulationModal()"
    [hidden]="false"
    [size]="''"
>
    <div style="max-height: 70%" modal-body>
        <app-simulation-list-card
            [data]=simulationList
        />
    </div>
</app-modal>

<!-- form modal time_series -->
<app-modal
    *ngIf="timeSeriesModal.show"
    [title]="timeSeriesModal.title"
    (closeModal)="closeModal_TimeSeries()"
>
    <div modal-form>
        <div class="container" style="max-height: 70vh">
            <!-- Button Group Row -->
            <div class="row mb-3">
                <div class="col">
                    <div class="btn-group w-100" role="group">
                        <input
                            type="radio"
                            class="btn-check"
                            name="selectMode"
                            id="opt1"
                            autocomplete="off"
                            (click)="timeSeriesModal.selectedType = 'list'"
                        />
                        <label class="btn btn-outline-primary" for="opt1">
                            Options
                        </label>

                        <input
                            type="radio"
                            class="btn-check"
                            name="selectMode"
                            id="opt2"
                            autocomplete="off"
                            (click)="timeSeriesModal.selectedType = 'file'"
                            checked
                        />
                        <label class="btn btn-outline-primary" for="opt2">
                            CSV File
                        </label>

                        <input
                            type="radio"
                            class="btn-check"
                            name="selectMode"
                            id="opt3"
                            autocomplete="off"
                            (click)="timeSeriesModal.selectedType = 'number'"
                        />
                        <label class="btn btn-outline-primary" for="opt3">
                            Single Value
                        </label>
                    </div>
                </div>
            </div>

            <!-- Inputs -->
            <div class="row mb-3">
                <div class="col">
                    <!-- Dropdown -->
                    <div *ngIf="timeSeriesModal.selectedType === 'list'">
                        <select class="form-select">
                            <option selected>Select option</option>
                            <option value="1">Option 1</option>
                            <option value="2">Option 2</option>
                            <option value="2">Option 2</option>
                            <option value="2">Option 2</option>
                            <option value="2">Option 2</option>
                        </select>
                    </div>

                    <!-- File -->
                    <div *ngIf="timeSeriesModal.selectedType === 'file'">
                        <input
                            type="file"
                            class="form-control"
                            (change)="onSelectFile_TimeSeries($event)"
                            accept=".csv"
                        />
                    </div>

                    <!-- Text -->
                    <div *ngIf="timeSeriesModal.selectedType === 'number'">
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Enter text"
                        />
                    </div>
                </div>
            </div>

            <!-- data-table of csv file -->
            <div class="frame" *ngIf="tableData.length">
                <div class="column-selector">
                    <label *ngFor="let col of columns; let i = index">
                        <input
                            type="radio"
                            (change)="checkEmptyRows(i)"
                            [id]="col.name"
                            name="selectedCol"
                        />
                        {{ col.name }}
                    </label>
                </div>

                <p class="text-danger" *ngIf="emptyRows.length > 0">
                    <b> Error: {{ emptyRows.length }} Row(s) are Null/Empty!</b>
                </p>

                <hot-table
                    [data]="tableData"
                    [settings]="timeSeries_gridSettings"
                    (afterChange)="onTableEdit()"
                >
                </hot-table>
            </div>

            <!-- time-series chart -->
            <div
                id="plot_timeSeries"
                style="min-height: 400px"
                *ngIf="false"
            ></div>
        </div>
    </div>

    <div modal-actions>
        <button
            type="submit"
            class="btn btn--success btn--medium"
            (click)="closeModal_TimeSeries()"
        >
            <span>{{ timeSeriesModal.action.label }}</span>
        </button>
    </div>
    >
</app-modal>
