<section
    class="drawflow"
    [ngClass]="{
        'no-data':
            editor && (editor.drawflow.drawflow.Home.data | json) === '{}',
    }"
>
    <div id="drawflow" (drop)="onDrop($event)" (dragover)="allowDrop($event)">
        <!-- <div class="gui__empty-text">
            <span> Drag and drop components to build your energy system </span>
            <span>DoubleClick: Opens form to enter parameters</span>
            <span>Middle Mousebutton: Mirror the selected block</span>
        </div> -->

        <div class="bar-zoom shadow rounded">
            <i class="full-screen" (click)="_toggleFullScreen()"></i>
            <i class="zoom-in" (click)="editor.zoom_in()"></i>
            <i class="zoom-reset" (click)="editor.zoom_reset()"></i>
            <i class="zoom-out" (click)="editor.zoom_out()"></i>
            <i
                class="delete-all"
                title="Delete All"
                (click)="clearGridModel()"
                *ngIf="
                    editor &&
                    (editor.drawflow.drawflow.Home.data | json) !== '{}'
                "
            ></i>
        </div>
    </div>
</section>

<!-- Context Menu -->
<div
    *ngIf="contextmenu"
    class="context-menu position-fixed bg-white border rounded"
    [style.left.px]="contextmenu.x"
    [style.top.px]="contextmenu.y"
    id="contextmenu"
>
    <div class="list-group list-group-flush rounded">
        <div
            class="submenu-parent list-group-item list-group-item-action d-flex justify-content-between position-relative"
        >
            <span *ngIf="contextmenu.direction === 'left'">
                <i class="arrow-left"></i>
            </span>
            <span> Node</span>
            <span *ngIf="contextmenu.direction === 'right'">
                <i class="arrow-right"> </i>
            </span>

            <div
                class="nested-menu list-group position-absolute bg-white border rounded"
                [ngClass]="{
                    'right-100': contextmenu.direction === 'left',
                    'left-100': contextmenu.direction === 'right',
                }"
            >
                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="showModalEdit('node')"
                >
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Edit</span>
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>

                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="deleteSelectedNode()"
                >
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Delete</span>
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>
            </div>
        </div>

        <!-- color picker - flows -->
        <div
            class="submenu-parent color-picker list-group-item list-group-item-action d-flex justify-content-between position-relative"
            *ngIf="contextmenu.nodeClass === 'bus'"
        >
            <!-- color picker for bus -->
            <span> Flows Color &nbsp;</span>
            <div
                class="nested-menu list-group position-absolute bg-white border rounded p-1"
                [ngClass]="{
                    'right-100': contextmenu.direction === 'left',
                    'left-100': contextmenu.direction === 'right',
                }"
                style="flex-direction: row; gap: 0.5rem"
            >
                <button
                    class="btn btn--info"
                    (click)="onChangeBusFlowsColor(colorPicker)"
                >
                    <img
                        src="../../../../../static/assets/icons/feather/white/check.svg"
                        alt=""
                        height="22px"
                    />
                </button>

                <input
                    #colorPicker
                    id="colorPickerBus_{{ contextmenu.nodeId }}"
                    type="color"
                    class="w-100 h-auto"
                    [value]="contextmenu.nodeFlowsColor"
                />
            </div>
        </div>

        <!-- flows -->
        <!-- in -->
        <div
            class="submenu-parent list-group-item list-group-item-action d-flex justify-content-between position-relative px-2"
            *ngFor="let item of contextmenu.nodeConnections?.in; let i = index"
        >
            <span *ngIf="contextmenu.direction === 'left'">
                <i class="arrow-left"></i>
            </span>
            <span>
                <img
                    src="../../../../../static/assets/icons/node-port/port-in.svg"
                    alt="port-in"
                />
                {{ item.source.node.name }}
            </span>
            <span *ngIf="contextmenu.direction === 'right'">
                <i class="arrow-right"> </i>
            </span>

            <div
                class="nested-menu list-group position-absolute bg-white border rounded"
                [ngClass]="{
                    'right-100': contextmenu.direction === 'left',
                    'left-100': contextmenu.direction === 'right',
                }"
            >
                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="showModalEdit('flow', item)"
                >
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Edit</span>
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>

                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="deleteFlow(item.source, item.destination)"
                >
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Delete</span>
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>
            </div>
        </div>

        <!-- out -->
        <div
            class="submenu-parent list-group-item list-group-item-action d-flex justify-content-between position-relative px-2"
            *ngFor="let item of contextmenu.nodeConnections?.out"
        >
            <span *ngIf="contextmenu.direction === 'left'">
                <i class="arrow-left"></i>
            </span>
            <span>
                {{ item.destination.node.name }}
                <img
                    src="../../../../../static/assets/icons/node-port/port-out.svg"
                    alt="port-out"
                />
            </span>
            <span *ngIf="contextmenu.direction === 'right'">
                <i class="arrow-right"> </i>
            </span>

            <div
                class="nested-menu list-group position-absolute bg-white border rounded"
                [ngClass]="{
                    'right-100': contextmenu.direction === 'left',
                    'left-100': contextmenu.direction === 'right',
                }"
            >
                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="showModalEdit('flow', item)"
                >
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Edit</span>
                    <i
                        class="edit"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>

                <div
                    class="list-group-item list-group-item-action d-flex justify-content-between"
                    (click)="deleteFlow(item.source, item.destination)"
                >
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'left'"
                    ></i>
                    <span> Delete</span>
                    <i
                        class="trash"
                        *ngIf="contextmenu.direction === 'right'"
                    ></i>
                </div>
            </div>
        </div>
    </div>
</div>

<svg
    id="magnetic-overlay"
    style="
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    "
></svg>
