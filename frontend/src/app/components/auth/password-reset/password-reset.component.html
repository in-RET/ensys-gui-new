<main class="w-100 m-auto signup">
    <div
        class="d-flex justify-content-center gap-2"
        style="position: absolute; top: 0; left: 0; margin: 1rem"
    >
        <button
            class="btn btn--success btn--small"
            type="button"
            [routerLink]="['/']"
        >
            Home
        </button>
    </div>

    <form class="signup-frame">
        <div class="signup-frame__img">
            <img
                src="/static/assets/illustrations/open_plan_hero_hexagon.svg"
                alt="open_plan cells"
            />
        </div>

        <div class="form-floating mb-3">
            <input
                type="email"
                class="form-control"
                placeholder="email"
                [formControl]="email"
                required
                [ngClass]="{
                    'is-invalid':
                        email!.invalid && (email!.dirty || email!.touched),
                }"
            />
            <label for="floatingInput">Email address</label>
        </div>

        <button
            class="btn btn--large"
            type="submit"
            [disabled]="!email.valid || loading"
            (click)="onSubmit()"
        >
            Send email
            <div
                class="spinner-border spinner-border-sm"
                role="status"
                [hidden]="!loading"
            >
                <span class="visually-hidden">Loading...</span>
            </div>
        </button>

        <div class="mt-1 text-danger" *ngIf="errMsg">
            <p>{{ errMsg }}</p>
        </div>

        <div class="signup-frame__subheading">
            <a href="/auth/login">Login</a>
        </div>
    </form>
</main>
